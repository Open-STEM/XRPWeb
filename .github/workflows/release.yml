# github workflow to make a release
name: Create release based on a tag
on:
  push:
    tags:
      - 'v*' # Trigger when a tag like v1.0.0 is pushed
permissions:
  contents: write # Grants write permission to repository contents

jobs:
  release:
    name: Release pushed tag
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
            node-version: ${{ matrix.node-version }}
            cache: 'npm'
      - name: Install dependencies
        run: npm install
      - name: test
        run: npm run test
      - name: Build
        run: npm run build
      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
            # upload dist repository
            path: './dist'
      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Extract tag name
          TAG="${{ github.ref_name }}"

          # Create a GitHub release using the GitHub CLI
          gh release create "$TAG" \
            --repo="${{ github.repository }}" \
            --title="${TAG#v}" \
            --generate-notes # Automatically generates release notes

